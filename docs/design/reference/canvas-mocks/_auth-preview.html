<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>auth — preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../styles.css"/>
<link rel="stylesheet" href="../canvas-tokens.css"/>
<style>
  body { margin:0; background:#e8e2d8; padding:24px; font-family:Geist, sans-serif; }
  .row { display:grid; grid-template-columns: repeat(2, 1fr); gap:24px; max-width:2520px; margin:0 auto 24px; }
  .frame { background:var(--bg); border-radius:12px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.08); }
  .frame > .label { padding:8px 14px; background:#fff; font-family:'IBM Plex Mono', monospace; font-size:11px; color:#9c7e62; border-bottom:1px solid var(--line); }
  .frame > .body { width:1200px; height:800px; transform-origin: top left; transform: scale(0.5); }
  .row-2 .frame > .body { width:1200px; height:800px; }
</style>
</head>
<body>
<div class="row">
  <div class="frame"><div class="label">Crear cuenta</div><div class="body" id="signup"></div></div>
  <div class="frame"><div class="label">Ingresar</div><div class="body" id="login"></div></div>
</div>
<div class="row">
  <div class="frame"><div class="label">Recuperar contraseña</div><div class="body" id="forgot"></div></div>
  <div class="frame"><div class="label">Link enviado</div><div class="body" id="forgot-sent"></div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('signup')).render(<SignupView/>);
  ReactDOM.createRoot(document.getElementById('login')).render(<LoginView/>);
  ReactDOM.createRoot(document.getElementById('forgot')).render(<ForgotView/>);
  ReactDOM.createRoot(document.getElementById('forgot-sent')).render(<ForgotSentView/>);
</script>
</body>
</html>
