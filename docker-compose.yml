services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: planb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: planb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: planb
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - planb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planb -d planb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Mailpit — actively-maintained fork of MailHog. Used in both dev and CI so the
  # HTTP client has a single API to target. MailHog-compatible SMTP on 1025;
  # Mailpit-native HTTP API at /api/v1/* on 8025.
  mailpit:
    image: axllent/mailpit:v1.29
    container_name: planb-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  planb_postgres_data:
    name: planb_postgres_data
