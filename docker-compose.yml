services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: planb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: planb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: planb
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - planb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planb -d planb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis — cache + ephemeral state (refresh tokens, rate limiting, hot reads,
  # idempotency keys, crowd insights cache). See ADR-0034. Auth required even in
  # dev so dev parity matches prod; password lives in REDIS_PASSWORD env var.
  redis:
    image: redis:7-alpine
    container_name: planb-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - planb_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Mailpit — actively-maintained fork of MailHog. Used in both dev and CI so the
  # HTTP client has a single API to target. MailHog-compatible SMTP on 1025;
  # Mailpit-native HTTP API at /api/v1/* on 8025.
  mailpit:
    image: axllent/mailpit:v1.29
    container_name: planb-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  planb_postgres_data:
    name: planb_postgres_data
  planb_redis_data:
    name: planb_redis_data
