# Dependabot abre PRs para deps de npm actualizando `frontend/package.json` pero
# NO regenera `frontend/bun.lock`. El job `Frontend (Next.js 15 / Bun)` de
# `ci.yml` corre `bun install --frozen-lockfile` y falla con:
#
#   error: lockfile had changes, but lockfile is frozen
#
# Este workflow detecta esa condición en cualquier PR abierto por Dependabot,
# regenera el lockfile con `bun install`, y lo commitea + pushea al branch del
# PR. El siguiente run del CI ya encuentra el lockfile consistente.
#
# IMPORTANTE: el push usa un token generado por una GitHub App (`planb-ci-bot`),
# no el `GITHUB_TOKEN` default. Razón: GitHub Actions tiene una restricción de
# seguridad — pushes hechos con GITHUB_TOKEN NO disparan workflows downstream
# (anti-loop). Eso significaba que el CI no se re-corría después del push del
# lockfile y los checks quedaban rojos hasta que alguien hiciera @dependabot
# recreate manual. Los App tokens sí disparan workflows. Decisión documentada
# en ADR-0043.
#
# Setup de la App (ya hecho, documentado para reproducibilidad):
#   1. Crear GitHub App `planb-ci-bot` en https://github.com/settings/apps/new
#      con permissions: Contents R/W, Pull requests R/W, Metadata R/O.
#   2. Generar private key (.pem) y App ID.
#   3. Instalar la App en el repo plan-b (Only select repositories).
#   4. Guardar como secrets del repo:
#        - LOCKFILE_BOT_APP_ID = número del App ID.
#        - LOCKFILE_BOT_PRIVATE_KEY = contenido completo del .pem.
#
# Limitaciones conocidas:
#   - Solo aplica a Dependabot. Otros bots o pushes humanos con package.json
#     desincronizado siguen fallando, lo cual es lo que queremos (un dev humano
#     que tocó package.json debe haber corrido bun install local antes de pushear).
#   - Si la regeneración del lockfile dispara un major-update transitivo
#     conflictivo, el bun install falla aquí y el workflow termina sin commit.
#     Eso es preferible a commitear un lockfile que rompe el build.

name: Dependabot bun lockfile

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'frontend/package.json'
      - 'frontend/bun.lock'

# Permisos del GITHUB_TOKEN default: pull-requests:read solo para que la
# condition `if` pueda leer el author del PR. El push se hace con el App token
# generado en el step `Generate App token`, no con GITHUB_TOKEN.
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dependabot-lockfile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regen-lockfile:
    # Solo PRs abiertos por dependabot[bot]. Ningún otro autor dispara este job.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    # `bun install` + commit local + push. Sin caches frías ≈ 1-2 min. Si pasa
    # de 5 min algo se trabó (red, resolver de deps en loop): cortamos.
    timeout-minutes: 5
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LOCKFILE_BOT_APP_ID }}
          private-key: ${{ secrets.LOCKFILE_BOT_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          # pull_request_target da el ref del base (main). Para poder modificar
          # el branch del PR (y push back), checkeamos su ref explícito.
          ref: ${{ github.event.pull_request.head.ref }}
          # App token: el push lo hace `planb-ci-bot`, y los pushes de Apps SI
          # disparan workflows downstream (a diferencia del GITHUB_TOKEN).
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pineado al rango que matchea el dev local (engines.bun >= 1.3.0).
          # `latest` puede regenerar un lockfile incompatible con la versión
          # que usa ci.yml/e2e.yml si Bun rompe el formato.
          bun-version: 1.3.x

      - name: Regenerate lockfile
        working-directory: ./frontend
        run: |
          # Sin --frozen-lockfile: queremos que bun update el lockfile para
          # matchear el package.json que Dependabot acaba de modificar.
          bun install

      - name: Commit + push si el lockfile cambió
        env:
          APP_ID: ${{ secrets.LOCKFILE_BOT_APP_ID }}
        run: |
          if git diff --quiet -- frontend/bun.lock; then
            echo "Lockfile already in sync with package.json. Nothing to commit."
            exit 0
          fi

          # Identidad del commit = la App. El email noreply tiene shape estándar
          # `<id>+<app-name>[bot]@users.noreply.github.com`. Sin ese shape los
          # commits aparecen como "Unknown" en la UI de GitHub.
          git config user.name "planb-ci-bot[bot]"
          git config user.email "${APP_ID}+planb-ci-bot[bot]@users.noreply.github.com"
          git add frontend/bun.lock
          # Mensaje en formato conventional commits para no romper `pr-title.yml`.
          # build(deps): scope espejo de los PRs que Dependabot abre.
          git commit -m "build(deps): regenerate bun.lock for dependabot bump"
          git push
