name: Docs links

# Verifica que los links en archivos markdown del repo no estén rotos.
# Tenemos ~40 docs entre ADRs, user-stories, epics, CLAUDE.md y conventions
# con cross-refs entre sí; cuando un archivo se renombra (ej. ADR-0037
# release-please → auto-append) los links viejos quedan colgados sin que
# nadie se entere hasta que alguien los clickea.
#
# Lychee chequea links relativos (entre archivos) y absolutos (HTTP).
# Configurado en `.github/lychee.toml`. Externos pueden flakear (rate
# limits, sitios caídos), por eso el workflow falla sólo en internos
# rotos por default; los externos quedan como warning.

on:
  pull_request:
    paths:
      - "**.md"
      - ".github/lychee.toml"
      - ".github/workflows/docs-links.yml"
  push:
    branches: [main]
    paths:
      - "**.md"
      - ".github/lychee.toml"

permissions:
  contents: read

# Evita runs paralelos sobre el mismo ref.
concurrency:
  group: docs-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check links in markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        # Cache de respuestas HTTP exitosas para no re-pegar a externos cada run.
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('.github/lychee.toml') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .github/lychee.toml --no-progress './**/*.md'
          fail: true
