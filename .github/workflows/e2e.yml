name: E2E (Playwright)

# Frontend E2E. Levanta backend + servicios + frontend production build,
# corre Playwright contra todo, sube traces como artifact si falla.
#
# Trigger on-demand (no en cada push):
#   - PR con label `e2e`: corre la suite contra esa branch.
#   - Push a main: corre como gate post-merge.
#   - workflow_dispatch: trigger manual desde la UI de Actions.
#
# Decisión de "on-demand" en ADR-0036: la suite es lenta (~5-7min) y los
# specs de auth ya tienen cobertura unit+integration en backend +
# component en frontend (US-T01). E2E sirve para integración cross-stack,
# no para feedback rápido.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E suite
    runs-on: ubuntu-latest
    # Solo corre si el PR tiene label `e2e`, OR push a main, OR dispatch manual.
    # Para PRs sin label: skip (mostrará "Skipped" en el merge UI).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'e2e'))

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: planb
          POSTGRES_PASSWORD: planb_test
          POSTGRES_DB: planb_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U planb -d planb_test"
          --health-interval 5s --health-timeout 5s --health-retries 10

      mailpit:
        image: axllent/mailpit:v1.29
        ports: ['1025:1025', '8025:8025']
        options: >-
          --health-cmd "/mailpit readyz"
          --health-interval 5s --health-timeout 3s --health-retries 10
          --health-start-period 5s

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Planb: Host=localhost;Port=5432;Database=planb_test;Username=planb;Password=planb_test
      ConnectionStrings__PlanbWolverine: Host=localhost;Port=5432;Database=planb_test;Username=planb;Password=planb_test
      ConnectionStrings__Redis: localhost:6379
      JWT__Secret: ci-test-jwt-secret-must-be-at-least-32-chars-long
      # Issuer y Audience TIENEN que matchear los hardcoded del frontend
      # (lib/session.ts: ISSUER='planb', AUDIENCE='planb'). Si CI emite con
      # otro valor (ej. 'planb-test'), jwtVerify rechaza con "unexpected
      # 'iss' claim value", el guard considera "sin sesión" y redirect /auth.
      JWT__Issuer: planb
      JWT__Audience: planb
      # Frontend env (lib/env.ts serverSchema). JWT_SECRET TIENE que matchear
      # el JWT__Secret del backend porque el frontend valida el access token
      # via jose.jwtVerify (HS256 simétrico).
      JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-chars-long
      SESSION_SECRET: ci-test-session-secret-must-be-at-least-32-chars-long
      # Override que usa el helper redis.ts para skipear podman exec viejo.
      # Hoy el helper usa ioredis directo y no mira esto, pero lo dejamos
      # como cinturón para no romper si reintroducimos el path container.
      REDIS_CONTAINER_CMD: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Restore + build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Start backend in background
        # En Development env, el host arranca con Wolverine ResourceAutoCreate
        # = CreateOrUpdate (Program.cs:95), así que migra y crea las tablas
        # automáticamente al primer startup. La DevSeedHostedService corre en
        # paralelo y siembra las personas (Lucía, Mateo, Paula, Martín).
        #
        # Ojo: /health responde 200 ni bien el host está sirviendo, ANTES de
        # que el seeder termine. Si los tests pegan al sign-in antes que la
        # DevSeedHostedService haya materializado a Lucía, las creds caen
        # con 401. Por eso poleamos contra un sign-in real (rápido, idempotente)
        # como proxy de "seed listo".
        working-directory: backend
        run: |
          nohup dotnet run --no-build --configuration Release --project host/Planb.Api > /tmp/backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          # 1) Esperar que el host responda al healthcheck.
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Host healthy after ${i}s"; break
            fi
            sleep 1
          done
          # 2) Esperar que el seed haya materializado las personas. Sondeamos
          # con un sign-in de Lucía: 200 = persona creada, 401 = todavía no.
          for i in {1..30}; do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:5000/api/identity/sign-in \
              -H "Content-Type: application/json" \
              -d '{"email":"lucia.mansilla@gmail.com","password":"lucia.mansilla.12"}' \
              || echo "000")
            if [ "$status" = "200" ]; then
              echo "Seed ready after ${i}s"; break
            fi
            echo "Seed not ready yet (status=$status), waiting..."
            sleep 2
          done

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Write frontend .env.local for CI
        # Las server env vars (JWT_SECRET, SESSION_SECRET) están en el `env:`
        # del job pero `bun next start` no siempre las propaga al runtime de
        # Next.js cuando se levanta como background process. Materializarlas
        # en .env.local garantiza que Next las lea por su mecanismo estándar
        # (cwd-based dotenv) al arrancar.
        working-directory: frontend
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_API_URL=http://localhost:5000
          JWT_SECRET=${{ env.JWT_SECRET }}
          SESSION_SECRET=${{ env.SESSION_SECRET }}
          EOF

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Start frontend in background
        working-directory: frontend
        run: |
          nohup bun next start -p 3000 > /tmp/frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend ready after ${i}s"; break
            fi
            sleep 1
          done

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          BACKEND_URL: http://localhost:5000
          MAILPIT_URL: http://localhost:8025
          CI: 'true'
        run: bunx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 7

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-log
          path: /tmp/frontend.log
          retention-days: 7
