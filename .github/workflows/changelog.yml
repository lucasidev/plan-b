name: Changelog auto-append

# Appendea cada commit del push range a la sección [Unreleased] de CHANGELOG.md.
# Implementa ADR-0037. Versioning está cubierto por separado en ADR-0038
# (pre-deploy = no hay versiones), así que este workflow NO bumpea versión,
# NO crea tags, y NO crea GitHub Releases.
#
# IMPORTANTE (token, ADR-0043 re-evaluado 2026-07-10): este workflow usaba
# GITHUB_TOKEN porque sus pushes no disparan workflows downstream (no re-corre
# CI/E2E sobre un commit docs-only). El ruleset de `main` bloquea los pushes
# directos, y GitHub no permite dar bypass a la app "GitHub Actions" en repos
# personales (ni por API ni por UI), así que el push migró al token de la App
# `planb-ci-bot` (bypass actor del ruleset, la misma App de
# dependabot-bun-lockfile.yml). La propiedad anti-retrigger que daba
# GITHUB_TOKEN ahora la da el `[skip ci]` en el mensaje del commit.

on:
  push:
    branches: [main]

# El push lo hace el App token generado en `Generate App token`; el
# GITHUB_TOKEN default solo lee.
permissions:
  contents: read

# Evita runs paralelos pisándose entre sí en el mismo CHANGELOG.md.
concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  append:
    name: Append commits to CHANGELOG
    runs-on: ubuntu-latest
    # Append + commit + push. Run típico < 30s. 5 min para cortar si algo se
    # cuelga (push back se traba, git auto-commit reintenta, etc.).
    timeout-minutes: 5
    # No procesar nuestros propios commits (evita loop). El [skip ci] del
    # commit ya evita el retrigger a nivel plataforma, pero este filtro
    # también previene runs accidentales de un push manual con el mismo prefix.
    if: ${{ !startsWith(github.event.head_commit.message, 'docs(changelog):') }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.LOCKFILE_BOT_APP_ID }}
          private-key: ${{ secrets.LOCKFILE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Necesitamos historia suficiente para resolver el rango
          # PUSH_BEFORE..PUSH_AFTER. fetch-depth: 0 hace clone completo;
          # planb es chico, así que el costo es bajo. Si llegara a doler,
          # usar `fetch-depth: ${{ github.event.commits.length + 1 }}`.
          fetch-depth: 0
          # App token: `planb-ci-bot` es bypass actor del ruleset de main; el
          # GITHUB_TOKEN ya no puede pushear directo a main.
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pineado al rango que matchea el dev local (engines.bun >= 1.3.0).
          bun-version: 1.3.x

      - name: Append commits to CHANGELOG
        run: bun scripts/append-changelog.ts
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Push range: el script itera git log PUSH_BEFORE..PUSH_AFTER --reverse.
          # Esto es necesario para Rebase merges (default por ADR-0026), donde
          # un PR con N commits triggerea un solo push event con N commits en
          # el rango. Sin esto sólo HEAD entra al CHANGELOG.
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}

      - name: Commit changes back
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          # [skip ci] en el body: los pushes con App token SÍ disparan
          # workflows (a diferencia de GITHUB_TOKEN); el marker le dice a
          # GitHub que no corra CI/E2E sobre este commit docs-only.
          commit_message: |
            docs(changelog): auto-update from ${{ github.event.head_commit.id }}

            [skip ci]
          # Identidad del commit = la App (mismo shape de email que
          # dependabot-bun-lockfile.yml; sin ese shape los commits aparecen
          # como "Unknown" en la UI de GitHub).
          commit_user_name: 'planb-ci-bot[bot]'
          commit_user_email: '${{ secrets.LOCKFILE_BOT_APP_ID }}+planb-ci-bot[bot]@users.noreply.github.com'
          file_pattern: CHANGELOG.md
          # Si el script no modificó nada (todos los commits del rango son
          # skip-by-default, o todos ya están en el CHANGELOG, o todos tienen
          # [skip changelog]), la action no hace nada en lugar de fallar.
          skip_dirty_check: false
          skip_fetch: true
          skip_checkout: true
