name: Changelog auto-append

# Appendea cada commit del push range a la sección [Unreleased] de CHANGELOG.md.
# Implementa ADR-0037. Versioning está cubierto por separado en ADR-0038
# (pre-deploy = no hay versiones), así que este workflow NO bumpea versión,
# NO crea tags, y NO crea GitHub Releases.
#
# IMPORTANTE: este workflow usa GITHUB_TOKEN a propósito, NO la GitHub App
# planb-ci-bot que sí usa dependabot-bun-lockfile.yml. ADR-0043 documenta los
# dos casos: el push del CHANGELOG NO debe redisparar ci.yml/e2e.yml (sería
# doblar el costo de CI/E2E sobre commits docs-only). La restricción de
# GITHUB_TOKEN (no dispara workflows downstream) es exactamente lo que queremos.
# NO migrar a App token "por consistencia": leer ADR-0043 sección "Cuándo NO
# migrar" antes de tocar.

on:
  push:
    branches: [main]

permissions:
  # Necesario para que git-auto-commit-action pueda commitear y pushear.
  contents: write

# Evita runs paralelos pisándose entre sí en el mismo CHANGELOG.md.
concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  append:
    name: Append commits to CHANGELOG
    runs-on: ubuntu-latest
    # Append + commit + push. Run típico < 30s. 5 min para cortar si algo se
    # cuelga (push back se traba, git auto-commit reintenta, etc.).
    timeout-minutes: 5
    # No procesar nuestros propios commits (evita loop). El default GITHUB_TOKEN
    # ya tiene una protección a nivel de plataforma (commits hechos con él no
    # disparan workflows), pero este filtro también previene runs accidentales
    # de un push manual con el mismo prefix.
    if: ${{ !startsWith(github.event.head_commit.message, 'docs(changelog):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Necesitamos historia suficiente para resolver el rango
          # PUSH_BEFORE..PUSH_AFTER. fetch-depth: 0 hace clone completo;
          # planb es chico, así que el costo es bajo. Si llegara a doler,
          # usar `fetch-depth: ${{ github.event.commits.length + 1 }}`.
          fetch-depth: 0
          # Token con permisos para pushear back al repo.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pineado al rango que matchea el dev local (engines.bun >= 1.3.0).
          bun-version: 1.3.x

      - name: Append commits to CHANGELOG
        run: bun scripts/append-changelog.ts
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Push range: el script itera git log PUSH_BEFORE..PUSH_AFTER --reverse.
          # Esto es necesario para Rebase merges (default por ADR-0026), donde
          # un PR con N commits triggerea un solo push event con N commits en
          # el rango. Sin esto sólo HEAD entra al CHANGELOG.
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}

      - name: Commit changes back
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'docs(changelog): auto-update from ${{ github.event.head_commit.id }}'
          file_pattern: CHANGELOG.md
          # Si el script no modificó nada (todos los commits del rango son
          # skip-by-default, o todos ya están en el CHANGELOG, o todos tienen
          # [skip changelog]), la action no hace nada en lugar de fallar.
          skip_dirty_check: false
          skip_fetch: true
          skip_checkout: true
