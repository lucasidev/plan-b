name: Commits (Conventional Commits)

# Valida que TODOS los commits del PR sean Conventional Commits válidos,
# usando el mismo regex que Lefthook commit-msg local (scripts/check-commit-msg.ts).
#
# Por qué este workflow además de pr-title.yml:
#   - pr-title.yml cubre el caso "PR mergeado con Squash" (el title se vuelve
#     el commit en main).
#   - Lefthook commit-msg cubre el caso "developer commiteando localmente
#     con los hooks instalados".
#   - Pero queda un gap: alguien con `--no-verify` puede bypassear lefthook,
#     y un Rebase merge desde una branch vieja conserva esos commits malos
#     en main. Este workflow corre en CI sobre el rango del PR y rechaza
#     si cualquier commit incumple.
#
# Performance: el job es trivial (~5s). Reusa el script TS, sin instalar tools
# extras.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    name: Validate every commit message
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Necesitamos el commit base del PR para hacer git log <base>..<head>.
          # fetch-depth: 0 hace clone completo. PR.s grandes (raros) podrían
          # querer un ajuste; planb es chico, fine.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate commits
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          shas=$(git rev-list --reverse "$base..$head")
          if [ -z "$shas" ]; then
            echo "No commits to validate (PR base == head)."
            exit 0
          fi

          fail=0
          for sha in $shas; do
            msg_file=$(mktemp)
            git log -1 --format=%B "$sha" > "$msg_file"
            if ! bun scripts/check-commit-msg.ts "$msg_file" 2>/dev/null; then
              short=$(git rev-parse --short "$sha")
              subject=$(git log -1 --format=%s "$sha")
              echo "::error ::commit $short has an invalid Conventional Commit subject:"
              echo "::error ::  \"$subject\""
              fail=1
            fi
            rm -f "$msg_file"
          done

          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "Conventional Commits format: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert."
            exit 1
          fi
