name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default mínimo. Los jobs no escriben al repo: ni push, ni labels, ni
# comments. Si en el futuro un job necesita más, lo declara local.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-based gate para backend / frontend: cambios que solo tocan docs/,
  # workflows ajenos o config periférica skipean los jobs que no aplican.
  # **E2E NO usa este gate**: corre siempre. Razón documentada en
  # docs/testing/conventions.md.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (.NET 10)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # Local típico: restore+build+test ≈ 4-6 min. 15 min deja headroom para
    # primer run sin caches (restore largo) sin tolerar un hang real.
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: planb
          POSTGRES_PASSWORD: planb_test
          POSTGRES_DB: planb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planb -d planb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Mailpit (actively-maintained fork of MailHog) catches outbound SMTP from integration
      # tests. SMTP on 1025; HTTP on 8025. Tests query the legacy `/api/v2/messages` shim that
      # Mailpit preserves for MailHog compatibility. We use Mailpit over MailHog because the
      # latter hasn't seen a release since 2020 and has known SMTP-binding quirks in GHA
      # service containers that leave HTTP reachable while SMTP silently refuses connections.
      mailpit:
        image: axllent/mailpit:v1.29
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "/mailpit readyz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s
      # Redis backs the refresh-token revocation list (ADR-0034). DI validation in Release
      # mode (ValidateOnBuild) requires IConnectionMultiplexer to resolve, so every test
      # that builds the host needs Redis reachable, even those that don't exercise refresh.
      # No password in CI: GHA service containers can't easily pass `--requirepass` as a
      # command arg, and CI Redis is inherently scoped to a single ephemeral runner. Dev
      # keeps AUTH on for prod parity (see docker-compose.yml).
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Pin the env explicitly so CI matches `just dev` (Wolverine dynamic codegen,
      # EF resource auto-create, Mailpit accessible at localhost:1025). Default
      # would be Production, which assumes pre-generated codegen artifacts that
      # we don't ship from CI. ADR-0035 covers the rationale and the migration
      # path to a Production-mode release pipeline once we have CD.
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Planb: Host=localhost;Port=5432;Database=planb_test;Username=planb;Password=planb_test
      ConnectionStrings__PlanbWolverine: Host=localhost;Port=5432;Database=planb_test;Username=planb;Password=planb_test
      ConnectionStrings__Redis: localhost:6379
      JWT__Secret: ci-test-jwt-secret-must-be-at-least-32-chars-long
      JWT__Issuer: planb-test
      JWT__Audience: planb-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: cd backend && dotnet restore
      - name: Format check
        run: cd backend && dotnet format --verify-no-changes
      # Build + test in Release so CI exercises the same configuration the
      # future deploy pipeline (F6 with Dokploy) will produce. Dev local stays
      # Debug for compile speed; the divergence is intentional. The bug class
      # this guards against (optimization-induced reordering, dead code paths
      # under #if DEBUG) is rare but Release-only, so the cost of catching it
      # in CI rather than at first deploy is small. Once release.yml exists,
      # ci.yml stays Release for fast feedback on prod-equivalent binaries.
      - name: Build
        run: cd backend && dotnet build --no-restore --configuration Release
      - name: Test
        run: cd backend && dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: "**/test-results.trx"

  frontend:
    name: Frontend (Next.js 15 / Bun)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    # install+lint+typecheck+build+test local ≈ 3-5 min. 10 min de headroom.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          # Pineado al rango minor estable que matchea el del dev local
          # (frontend/package.json engines.bun >= 1.3.0). `latest` rompe CI
          # silenciosamente si Bun publica un breaking release nocturno.
          bun-version: 1.3.x
      - name: Install
        run: cd frontend && bun install --frozen-lockfile
      - name: Lint
        run: cd frontend && bun run lint
      - name: Typecheck
        run: cd frontend && bunx tsc --noEmit
      - name: Build
        run: cd frontend && bun run build
      - name: Test
        run: cd frontend && bun run test

  # Suite Playwright. Corre SIEMPRE en cada PR (gate antes de merge).
  # Decisión 2026-05-23 (reset post-overkill): la industria estándar corre E2E
  # en CI en cada PR. Probamos antes con label-based + auto-labeler + detector
  # local de "zona E2E" y derivó en deuda combinatoria sin resolver el problema
  # real. Ahora: gate único, siempre activo, paralelizar con --shard si pasa
  # de 10min. Ver docs/testing/conventions.md.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Local típico ≈ 1min para la suite actual (6 specs). Setup de servicios +
    # build backend + build frontend + install browsers + run = ~10-12min en
    # CI sin caches frías. 25 min absorbe el peor escenario.
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: planb
          POSTGRES_PASSWORD: planb_test
          POSTGRES_DB: planb_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U planb -d planb_test"
          --health-interval 5s --health-timeout 5s --health-retries 10

      mailpit:
        image: axllent/mailpit:v1.29
        ports: ['1025:1025', '8025:8025']
        options: >-
          --health-cmd "/mailpit readyz"
          --health-interval 5s --health-timeout 3s --health-retries 10
          --health-start-period 5s

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Planb: Host=localhost;Port=5432;Database=planb_test;Username=planb;Password=planb_test
      ConnectionStrings__PlanbWolverine: Host=localhost;Port=5432;Database=planb_test;Username=planb;Password=planb_test
      ConnectionStrings__Redis: localhost:6379
      # Backend JWT issuance. CI usa 'planb-test' como issuer/audience para
      # diferenciar tokens del entorno test de los de dev/prod. El frontend
      # lee JWT_ISSUER / JWT_AUDIENCE del env (con default 'planb' para dev),
      # así que ambos lados pueden usar valores distintos por entorno mientras
      # matcheen entre sí dentro de cada entorno.
      JWT__Secret: ci-test-jwt-secret-must-be-at-least-32-chars-long
      JWT__Issuer: planb-test
      JWT__Audience: planb-test
      # Frontend env (lib/env.ts serverSchema). JWT_SECRET / JWT_ISSUER /
      # JWT_AUDIENCE TIENEN que matchear los del backend porque el frontend
      # valida el access token via jose.jwtVerify.
      JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-chars-long
      JWT_ISSUER: planb-test
      JWT_AUDIENCE: planb-test
      SESSION_SECRET: ci-test-session-secret-must-be-at-least-32-chars-long
      # Override que usa el helper redis.ts para skipear podman exec viejo.
      # Hoy el helper usa ioredis directo y no mira esto, pero lo dejamos
      # como cinturón para no romper si reintroducimos el path container.
      REDIS_CONTAINER_CMD: ''

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.x }

      - name: Restore + build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Start backend in background
        # En Development env, el host arranca con Wolverine ResourceAutoCreate
        # = CreateOrUpdate (Program.cs:95), así que migra y crea las tablas
        # automáticamente al primer startup. La DevSeedHostedService corre en
        # paralelo y siembra las personas (Lucía, Mateo, Paula, Martín).
        #
        # Ojo: /health responde 200 ni bien el host está sirviendo, ANTES de
        # que el seeder termine. Si los tests pegan al sign-in antes que la
        # DevSeedHostedService haya materializado a Lucía, las creds caen
        # con 401. Por eso poleamos contra un sign-in real (rápido, idempotente)
        # como proxy de "seed listo".
        working-directory: backend
        run: |
          set -e
          nohup dotnet run --no-build --configuration Release --project host/Planb.Api > /tmp/backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          # 1) Esperar que el host responda al healthcheck.
          healthy=0
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Host healthy after ${i}s"
              healthy=1; break
            fi
            sleep 1
          done
          if [ "$healthy" -ne 1 ]; then
            echo "::error ::Backend nunca respondió /health en 30s. Ver backend-log artifact."
            tail -50 /tmp/backend.log || true
            exit 1
          fi
          # 2) Esperar que el seed haya materializado las personas. Sondeamos
          # con un sign-in de Lucía: 200 = persona creada, 401 = todavía no.
          seeded=0
          for i in {1..30}; do
            status=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:5000/api/identity/sign-in \
              -H "Content-Type: application/json" \
              -d '{"email":"lucia.mansilla@gmail.com","password":"lucia.mansilla.12"}' \
              || echo "000")
            if [ "$status" = "200" ]; then
              echo "Seed ready after ${i}s"
              seeded=1; break
            fi
            echo "Seed not ready yet (status=$status), waiting..."
            sleep 2
          done
          if [ "$seeded" -ne 1 ]; then
            echo "::error ::DevSeed nunca terminó en 60s. Ver backend-log artifact."
            tail -50 /tmp/backend.log || true
            exit 1
          fi

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Write frontend .env.local for CI
        # Las server env vars (JWT_SECRET, SESSION_SECRET) están en el `env:`
        # del job pero `bun next start` no siempre las propaga al runtime de
        # Next.js cuando se levanta como background process. Materializarlas
        # en .env.local garantiza que Next las lea por su mecanismo estándar
        # (cwd-based dotenv) al arrancar.
        working-directory: frontend
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_API_URL=http://localhost:5000
          JWT_SECRET=${{ env.JWT_SECRET }}
          JWT_ISSUER=${{ env.JWT_ISSUER }}
          JWT_AUDIENCE=${{ env.JWT_AUDIENCE }}
          SESSION_SECRET=${{ env.SESSION_SECRET }}
          EOF

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Start frontend in background
        working-directory: frontend
        run: |
          set -e
          nohup bun next start -p 3000 > /tmp/frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
          ready=0
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend ready after ${i}s"
              ready=1; break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error ::Frontend nunca respondió en :3000 en 30s. Ver frontend-log artifact."
            tail -50 /tmp/frontend.log || true
            exit 1
          fi

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          BACKEND_URL: http://localhost:5000
          MAILPIT_URL: http://localhost:8025
          CI: 'true'
        run: bunx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 7

      - name: Upload frontend log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-log
          path: /tmp/frontend.log
          retention-days: 7
