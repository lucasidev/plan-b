pre-commit:
  parallel: true
  commands:
    frontend-format:
      glob: "frontend/**/*.{ts,tsx,js,jsx,json,css}"
      run: cd frontend && bunx biome check --write {staged_files}
      stage_fixed: true
    backend-format:
      glob: "backend/**/*.cs"
      run: cd backend && dotnet format --include {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional-commits:
      run: |
        msg=$(cat {1})
        pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?!?: .{1,72}'
        first_line=$(echo "$msg" | head -n 1)
        if ! echo "$first_line" | grep -qE "$pattern"; then
          echo "Error: Commit message must follow Conventional Commits format."
          echo ""
          echo "  <type>(<scope>): <description>"
          echo ""
          echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          echo "Scope is optional. Use ! for breaking changes (e.g. feat!: ...)"
          echo ""
          echo "Got: $first_line"
          exit 1
        fi

pre-push:
  commands:
    backend-test-quick:
      glob: "backend/**/*.cs"
      run: cd backend && dotnet build --nologo --verbosity quiet
