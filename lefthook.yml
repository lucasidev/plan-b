pre-commit:
  parallel: true
  commands:
    frontend-format:
      root: "frontend/"
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    backend-format:
      root: "backend/"
      glob: "*.cs"
      run: dotnet format --include {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional-commits:
      run: bun scripts/check-commit-msg.ts {1}

pre-push:
  parallel: true
  commands:
    backend-build:
      # Triggers restore which catches NU1608 (version conflicts) and NU1903
      # (CVE-vulnerable packages) because of <TreatWarningsAsErrors>true</>.
      glob: "backend/**/*.{cs,csproj,props,targets,sln,json}"
      run: cd backend && dotnet build --nologo --verbosity quiet
    backend-vulns:
      glob: "backend/**/*.{csproj,props,sln,json}"
      run: bun scripts/check-backend-vulns.ts
    frontend-lint:
      glob: "frontend/**/*.{ts,tsx,js,jsx,json}"
      run: cd frontend && bun run lint
    frontend-typecheck:
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && bunx tsc --noEmit
    frontend-test:
      # Vitest unit/component (US-T01). Rápido (~3s con jsdom + sample suite).
      # E2E (Playwright) ya NO corre en pre-push: vive en CI como un job del
      # workflow `ci.yml` y corre siempre en cada PR. Si querés correrlo
      # local manualmente: `just frontend-test-e2e-show` (browser visible).
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && bun run test
    frontend-react-doctor:
      # React Doctor scan acotado a los archivos que tu rama cambió vs main
      # (`--diff origin/main`). Bloquea el push si introducís un diagnostic
      # severity=error (server actions sin auth check, only-export-components,
      # etc). Warnings (a11y, perf, design) los muestra pero NO bloquean.
      # `--no-score` evita la share URL y el roundtrip al score API.
      # Suppressions de design system + falsos positivos viven en
      # `frontend/react-doctor.config.json`.
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && bunx react-doctor --diff origin/main --fail-on error --no-score --yes
