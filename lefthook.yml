pre-commit:
  parallel: true
  commands:
    frontend-format:
      root: "frontend/"
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    backend-format:
      root: "backend/"
      glob: "*.cs"
      run: dotnet format --include {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    conventional-commits:
      run: bun scripts/check-commit-msg.ts {1}

pre-push:
  parallel: true
  commands:
    backend-build:
      # Triggers restore which catches NU1608 (version conflicts) and NU1903
      # (CVE-vulnerable packages) because of <TreatWarningsAsErrors>true</>.
      glob: "backend/**/*.{cs,csproj,props,targets,sln,json}"
      run: cd backend && dotnet build --nologo --verbosity quiet
    backend-vulns:
      glob: "backend/**/*.{csproj,props,sln,json}"
      run: bun scripts/check-backend-vulns.ts
    frontend-lint:
      glob: "frontend/**/*.{ts,tsx,js,jsx,json}"
      run: cd frontend && bun run lint
    frontend-typecheck:
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && bunx tsc --noEmit
    frontend-test:
      # Vitest unit/component (US-T01). Rápido (~3s con jsdom + sample suite).
      # E2E (Playwright) corre en `e2e-zone` cuando el branch toca paths
      # listados en `.github/labeler.yml`.
      glob: "frontend/**/*.{ts,tsx}"
      run: cd frontend && bun run test
    e2e-zone:
      # Si el branch toca zona E2E (mismo glob set que `.github/labeler.yml`),
      # exigimos que Playwright pase localmente antes de pushear. Si la zona
      # no se toca, el script salta. Ver `scripts/check-e2e-zone.ts` para el
      # algoritmo completo y los escape hatches.
      run: bun scripts/check-e2e-zone.ts
